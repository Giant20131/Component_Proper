{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
  <div class="panel-head">
    <h2>Login</h2>
    <div class="panel-meta">Access your workspace</div>
  </div>
  <form class="form-grid" action="{{ url_for('login') }}" method="post">
    <label>
      Username
      <input type="text" name="username" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <div class="ip-note">
      Your current IP: <span>{{ current_ip }}</span>
    </div>
    <div class="form-submit">
      <button type="submit">Login</button>
      {% if ENABLE_SIGNUP %}
        <a class="ghost" href="{{ url_for('register') }}">Create account</a>
      {% endif %}
    </div>
  </form>
</section>
{% endblock %}

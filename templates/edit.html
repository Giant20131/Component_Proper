{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
  <div class="panel-head">
    <h2>Edit Component</h2>
    <div class="panel-meta">#{{ component.id }}</div>
  </div>
  <form class="form-grid" action="{{ url_for('edit_component', component_id=component.id) }}" method="post">
    <label>
      Name
      <input type="text" name="name" value="{{ component.name }}" required />
    </label>
    <label>
      Category
      <input type="text" name="category" list="category-list" value="{{ component.category }}" />
      <datalist id="category-list">
        {% for cat in categories %}
          <option value="{{ cat }}"></option>
        {% endfor %}
      </datalist>
    </label>
    <label>
      Price (per item)
      <input type="number" step="0.01" min="0" name="price" value="{{ component.price }}" required />
    </label>
    <label>
      Quantity
      <input type="number" min="1" name="quantity" value="{{ component.quantity }}" required />
    </label>
    <label>
      Bought date
      <input type="date" name="bought_date" value="{{ component.bought_date }}" />
    </label>
    <label>
      Component link
      <input type="url" name="link" value="{{ component.link }}" />
    </label>
    <div class="form-submit">
      <button type="submit">Save changes</button>
      <a class="ghost" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}

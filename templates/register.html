{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
  <div class="panel-head">
    <h2>Create Account</h2>
    <div class="panel-meta">Signup</div>
  </div>
  <form class="form-grid" action="{{ url_for('register') }}" method="post">
    <label>
      Username
      <input type="text" name="username" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <div class="form-submit">
      <button type="submit">Create account</button>
      <a class="ghost" href="{{ url_for('login') }}">I already have one</a>
    </div>
  </form>
</section>
{% endblock %}
